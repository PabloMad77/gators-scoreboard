<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>Gators Scoreboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Gators">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#003f74">

<link rel="apple-touch-icon" href="https://raw.githubusercontent.com/PabloMad77/gators-scoreboard/main/logo.PNG">
<link rel="icon" href="https://raw.githubusercontent.com/PabloMad77/gators-scoreboard/main/logo.PNG">

<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">

<style>
:root {
  --blue:       #004a87;
  --blue-dark:  #003166;
  --blue-mid:   #005fa3;
  --orange:     #f97316;
  --orange-dark:#c2410c;
  --white:      #ffffff;
  --offwhite:   #f0f0f0;
  --red:        #dc3545;
}

* { box-sizing: border-box; }

body {
  font-family: 'Roboto', sans-serif;
  text-align: center;
  background: linear-gradient(160deg, #002a5c 0%, #004a87 60%, #005fa3 100%);
  color: var(--white);
  margin: 0;
  padding: 20px;
  padding-top: max(20px, env(safe-area-inset-top));
  padding-bottom: max(20px, env(safe-area-inset-bottom));
  min-height: 100vh;
}

h1 {
  font-family: 'Oswald', sans-serif;
  font-size: 2.4rem;
  font-weight: 700;
  letter-spacing: 3px;
  text-transform: uppercase;
  margin-bottom: 6px;
  color: var(--orange);
  text-shadow: 0 2px 12px rgba(249,115,22,0.4);
}

h2 {
  font-family: 'Oswald', sans-serif;
  letter-spacing: 1px;
}

input, select {
  padding: 10px 14px;
  font-size: 15px;
  border-radius: 8px;
  border: 2px solid transparent;
  text-align: center;
  margin: 5px;
  background: rgba(255,255,255,0.12);
  color: white;
  outline: none;
  transition: border 0.2s;
}
input::placeholder { color: rgba(255,255,255,0.5); }
input:focus { border-color: var(--orange); }
select { background: rgba(255,255,255,0.12); color: white; }
select option { background: #004a87; color: white; }

.score-container {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin: 24px 0;
  flex-wrap: wrap;
}

.team {
  background: rgba(255,255,255,0.08);
  color: var(--white);
  padding: 24px 20px;
  border-radius: 18px;
  width: 280px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.3);
  position: relative;
  overflow: hidden;
  border: 1px solid rgba(255,255,255,0.12);
}

.team::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 5px;
  background: var(--orange);
}

.team h2 { margin: 0 0 4px; font-size: 1.3rem; color: var(--orange); }

.team input {
  background: rgba(255,255,255,0.1);
  color: var(--white);
  border: 2px solid rgba(255,255,255,0.15);
  width: 100%;
  margin: 0 0 8px;
  font-family: 'Oswald', sans-serif;
  font-weight: 600;
  font-size: 1.1rem;
}
.team input::placeholder { color: rgba(255,255,255,0.4); }
.team input:focus { border-color: var(--orange); }

.score {
  font-family: 'Oswald', sans-serif;
  font-size: 80px;
  font-weight: 700;
  line-height: 1;
  margin: 12px 0;
  color: var(--white);
  transition: transform 0.15s;
}

.score.bump { transform: scale(1.18); }

.score-buttons { display: flex; justify-content: center; gap: 6px; flex-wrap: wrap; }

button {
  padding: 11px 16px;
  font-size: 16px;
  font-family: 'Oswald', sans-serif;
  font-weight: 600;
  letter-spacing: 0.5px;
  margin: 4px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
  transition: transform 0.1s, opacity 0.1s;
}
button:active { transform: scale(0.95); opacity: 0.85; }

.add1 { background: #16a34a; color: white; }
.add6 { background: var(--blue-dark); color: white; }
.sub  { background: var(--red); color: white; }

.game-controls { margin: 10px 0; }
.export-btn { background: var(--orange); color: black; font-weight: 700; margin: 6px; }
.reset-btn  { background: rgba(0,0,0,0.4); color: white; margin: 6px; border: 1px solid rgba(255,255,255,0.2); }

hr { border: none; border-top: 1px solid rgba(255,255,255,0.15); margin: 40px 0; }

.stat-btn {
  background: var(--orange);
  color: black;
  font-weight: 700;
  font-size: 18px;
  padding: 13px 18px;
  margin: 6px;
  border-radius: 10px;
}

table {
  width: 100%;
  max-width: 600px;
  margin: 10px auto;
  border-collapse: collapse;
  background: rgba(255,255,255,0.07);
  color: white;
  border-radius: 10px;
  overflow: hidden;
  box-shadow: 0 4px 16px rgba(0,0,0,0.3);
  border: 1px solid rgba(255,255,255,0.1);
}
th, td { padding: 10px 14px; border-bottom: 1px solid rgba(255,255,255,0.08); }
th { background: var(--blue-dark); color: white; font-family: 'Oswald', sans-serif; letter-spacing: 0.5px; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: rgba(249,115,22,0.08); }

.modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.8);
  justify-content: center;
  align-items: center;
  z-index: 9999;
  padding: 16px;
}
.modal.open { display: flex; }

.modal-box {
  background: #003a6e;
  color: white;
  padding: 28px;
  border-radius: 16px;
  width: 100%;
  max-width: 420px;
  max-height: 90vh;
  overflow-y: auto;
  box-shadow: 0 20px 60px rgba(0,0,0,0.6);
  position: relative;
  border: 1px solid rgba(255,255,255,0.12);
}
.modal-box h3 {
  font-family: 'Oswald', sans-serif;
  margin-top: 0;
  color: var(--orange);
  font-size: 1.4rem;
}

.modal-close {
  position: absolute;
  top: 14px; right: 14px;
  background: rgba(255,255,255,0.1);
  border: none;
  border-radius: 50%;
  width: 30px; height: 30px;
  font-size: 16px;
  cursor: pointer;
  color: white;
  display: flex; align-items: center; justify-content: center;
  padding: 0;
}
.modal-close:hover { background: rgba(255,255,255,0.2); }

.player-btn-grid { display: flex; flex-direction: column; gap: 4px; justify-content: center; margin-top: 8px; width: 100%; }

.player-list-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 4px;
  border-bottom: 1px solid rgba(255,255,255,0.08);
}
.player-list-item span { font-weight: 500; }
.player-list-item .unit-badge {
  font-size: 11px;
  background: rgba(249,115,22,0.2);
  color: var(--orange);
  padding: 2px 8px;
  border-radius: 20px;
  margin-left: 8px;
}
.remove-btn { background: rgba(220,53,69,0.2); color: #f87171; font-size: 13px; padding: 4px 10px; border-radius: 6px; border: 1px solid rgba(220,53,69,0.3); }

.modal-box input, .modal-box select {
  background: rgba(255,255,255,0.1);
  color: white;
  border: 2px solid rgba(255,255,255,0.15);
  margin: 4px;
}
.modal-box input:focus { border-color: var(--orange); }

.add-player-row { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; margin-top: 12px; }
.add-player-row input { flex: 1; min-width: 120px; }

.subtitle { opacity: 0.6; font-size: 14px; margin: 0 0 16px; }

/* Saved indicator */
.save-indicator {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(60px);
  background: rgba(249,115,22,0.9);
  color: black;
  font-family: 'Oswald', sans-serif;
  font-weight: 700;
  padding: 10px 24px;
  border-radius: 30px;
  font-size: 14px;
  pointer-events: none;
  transition: transform 0.3s ease;
  z-index: 99999;
  letter-spacing: 1px;
}
.save-indicator.show { transform: translateX(-50%) translateY(0); }
</style>

</head>

<body>

<div id="scoreExportArea">

  <h1>Gators</h1>

  <div>
    <input id="categoryName" placeholder="Category / League" oninput="saveGameState()">
  </div>

  <div style="display:flex; justify-content:center; gap:8px; flex-wrap:wrap; margin-top:6px;">
    <select id="jornadaSelect" onchange="handleJornadaChange()">
      <option value="">Select Match</option>
      <option>Jornada 1</option>
      <option>Jornada 2</option>
      <option>Jornada 3</option>
      <option>Jornada 4</option>
      <option>Jornada 5</option>
      <option>Quarterfinal</option>
      <option>Semifinal</option>
      <option>Final</option>
      <option value="custom">Custom...</option>
    </select>
    <input id="customJornada" placeholder="Custom match name" style="display:none; max-width:180px;" oninput="saveGameState()">
  </div>

  <div class="score-container">
<div class="team">
  <h2>Gators</h2>
  <div class="score" id="gatorsScore">0</div>
  <div class="score-buttons">
    <button class="add1" onclick="updateScore('gators',1)">+1</button>
    <button class="add6" onclick="updateScore('gators',6)">+6</button>
    <button class="sub"  onclick="updateScore('gators',-1)">-1</button>
  </div>
</div>

<div class="team">
  <input id="opponentName" placeholder="Opponent Name" oninput="saveGameState()">
  <div class="score" id="opponentScore">0</div>
  <div class="score-buttons">
    <button class="add1" onclick="updateScore('opponent',1)">+1</button>
    <button class="add6" onclick="updateScore('opponent',6)">+6</button>
    <button class="sub"  onclick="updateScore('opponent',-1)">-1</button>
  </div>
</div>

  </div>

</div>

<div class="game-controls">
  <button class="export-btn" onclick="exportScore()">Export Score Image</button>
  <button class="reset-btn" onclick="resetGame()">Reset Game</button>
</div>

<hr>

<div id="statsExportArea">

  <h2>Player Stats</h2>

  <button onclick="openPlayerManager()" style="background:rgba(249,115,22,0.15); color:var(--orange); font-weight:600; margin-bottom:16px; border:1px solid rgba(249,115,22,0.3);">
    Manage Players
  </button>

  <h3 style="color:var(--orange);">Offense</h3>
  <div>
    <button class="stat-btn" onclick="openStat('td','offense')">TD</button>
    <button class="stat-btn" onclick="openStat('catch','offense')">CATCH</button>
    <button class="stat-btn" onclick="openStat('xp','offense')">XP</button>
  </div>
  <table id="offenseTable">
    <tr><th>Player</th><th>TD</th><th>CATCH</th><th>XP</th></tr>
  </table>

  <h3 style="color:var(--orange); margin-top:28px;">Defense</h3>
  <div>
    <button class="stat-btn" onclick="openStat('int','defense')">INT</button>
    <button class="stat-btn" onclick="openStat('flag','defense')">FLAG</button>
    <button class="stat-btn" onclick="openStat('sack','defense')">SACK</button>
    <button class="stat-btn" onclick="openStat('defTd','defense')">TD</button>
  </div>
  <table id="defenseTable">
    <tr><th>Player</th><th>INT</th><th>FLAG</th><th>SACK</th><th>TD</th></tr>
  </table>

</div>

<div style="margin-top:16px;">
  <button class="export-btn" onclick="exportStats()">Export Stats Image</button>
</div>

<!-- SAVE INDICATOR -->

<div class="save-indicator" id="saveIndicator">✓ SAVED</div>

<!-- IMAGE PREVIEW MODAL -->

<div class="modal" id="previewModal">
  <div class="modal-box" style="max-width:500px; text-align:center;">
    <button class="modal-close" onclick="closeModal('previewModal')">✕</button>
    <h3 style="margin-bottom:6px;">Preview</h3>
    <p class="subtitle" style="margin-bottom:14px;">Long-press the image to save, or use the button below</p>
    <img id="previewImg" style="width:100%; border-radius:10px; box-shadow:0 4px 20px rgba(0,0,0,0.4); display:block; margin-bottom:16px;">
    <button id="previewActionBtn" style="background:var(--orange); color:black; width:100%; padding:14px; font-size:17px; font-weight:700;">
      Save / Share
    </button>
    <p id="shareHint" style="font-size:12px; color:rgba(255,255,255,0.4); margin-top:10px; display:none;"></p>
  </div>
</div>

<!-- STAT MODAL -->

<div class="modal" id="statModal">
  <div class="modal-box">
    <button class="modal-close" onclick="closeModal('statModal')">✕</button>
    <h3 id="statModalTitle">Select Player</h3>
    <p class="subtitle">Tap + to add or − to remove</p>
    <div class="player-btn-grid" id="statPlayers"></div>
  </div>
</div>

<!-- PLAYER MANAGER MODAL -->

<div class="modal" id="playerModal">
  <div class="modal-box">
    <button class="modal-close" onclick="closeModal('playerModal')">✕</button>
    <h3>Manage Players</h3>

<div id="playerList" style="margin-bottom:16px; text-align:left;"></div>

<div style="background:rgba(255,255,255,0.06); border-radius:10px; padding:16px; border:1px solid rgba(255,255,255,0.1);">
  <strong style="display:block; margin-bottom:8px; color:rgba(255,255,255,0.8);">Add New Player</strong>
  <div class="add-player-row">
    <input id="newPlayerName" placeholder="Player name">
    <select id="newPlayerUnit" style="background:rgba(255,255,255,0.1); color:white; border:2px solid rgba(255,255,255,0.15);">
      <option value="offense">Offense</option>
      <option value="defense">Defense</option>
    </select>
  </div>
  <button onclick="addPlayer()" style="background:var(--orange); color:black; margin-top:10px; width:100%; padding:12px; font-weight:700;">
    Add Player
  </button>
</div>

  </div>
</div>

<script>

// ─── State ───────────────────────────────────────────────────────────────────

const GAME_KEY    = 'gators_game';
const PLAYERS_KEY = 'gators_players';

let gatorsScore   = 0;
let opponentScore = 0;
let players       = [];

// ─── Persistence ─────────────────────────────────────────────────────────────

function saveGameState() {
  const state = {
    gatorsScore,
    opponentScore,
    categoryName:  document.getElementById('categoryName').value,
    opponentName:  document.getElementById('opponentName').value,
    jornadaSelect: document.getElementById('jornadaSelect').value,
    customJornada: document.getElementById('customJornada').value,
  };
  localStorage.setItem(GAME_KEY, JSON.stringify(state));
  flashSaved();
}

function savePlayers() {
  localStorage.setItem(PLAYERS_KEY, JSON.stringify(players));
  flashSaved();
}

let _saveTimer = null;
function flashSaved() {
  const el = document.getElementById('saveIndicator');
  el.classList.add('show');
  clearTimeout(_saveTimer);
  _saveTimer = setTimeout(() => el.classList.remove('show'), 1400);
}

function loadState() {
  // Players
  players = JSON.parse(localStorage.getItem(PLAYERS_KEY) || '[]');

  // Game state
  const raw = localStorage.getItem(GAME_KEY);
  if (raw) {
    try {
      const s = JSON.parse(raw);
      gatorsScore   = s.gatorsScore   || 0;
      opponentScore = s.opponentScore || 0;
      document.getElementById('gatorsScore').innerText   = gatorsScore;
      document.getElementById('opponentScore').innerText = opponentScore;
      document.getElementById('categoryName').value  = s.categoryName  || '';
      document.getElementById('opponentName').value  = s.opponentName  || '';

      const jSel = document.getElementById('jornadaSelect');
      if (s.jornadaSelect) {
        jSel.value = s.jornadaSelect;
        if (s.jornadaSelect === 'custom') {
          document.getElementById('customJornada').style.display = 'inline-block';
          document.getElementById('customJornada').value = s.customJornada || '';
        }
      }
    } catch(e) {}
  }

  renderAll();
}

// ─── Score ────────────────────────────────────────────────────────────────────

function updateScore(team, val) {
  const key = team === 'gators' ? 'gatorsScore' : 'opponentScore';
  if (team === 'gators') {
    gatorsScore = Math.max(0, gatorsScore + val);
    document.getElementById('gatorsScore').innerText = gatorsScore;
  } else {
    opponentScore = Math.max(0, opponentScore + val);
    document.getElementById('opponentScore').innerText = opponentScore;
  }
  const el = document.getElementById(key);
  el.classList.remove('bump');
  void el.offsetWidth;
  el.classList.add('bump');
  setTimeout(() => el.classList.remove('bump'), 200);
  saveGameState();
}

function resetGame() {
  if (confirm('Reset game? Scores, opponent name, and match info will be cleared. Players and their stats will be kept.')) {
    gatorsScore   = 0;
    opponentScore = 0;
    document.getElementById('gatorsScore').innerText   = 0;
    document.getElementById('opponentScore').innerText = 0;
    document.getElementById('categoryName').value  = '';
    document.getElementById('opponentName').value  = '';
    document.getElementById('jornadaSelect').value = '';
    document.getElementById('customJornada').value = '';
    document.getElementById('customJornada').style.display = 'none';
    saveGameState();
  }
}

function handleJornadaChange() {
  const select = document.getElementById('jornadaSelect');
  const custom = document.getElementById('customJornada');
  custom.style.display = select.value === 'custom' ? 'inline-block' : 'none';
  saveGameState();
}

// ─── Players ───────────────────────────────────────────────────────────────

function openPlayerManager() {
  renderPlayerList();
  openModal('playerModal');
}

function renderPlayerList() {
  const container = document.getElementById('playerList');
  if (!players.length) {
    container.innerHTML = '<p style="color:rgba(255,255,255,0.4); text-align:center;">No players yet.</p>';
    return;
  }
  container.innerHTML = players.map(p => `
    <div class="player-list-item">
      <span>${p.name}<span class="unit-badge">${p.unit}</span></span>
      <button class="remove-btn" onclick="removePlayer(${p.id})">Remove</button>
    </div>
  `).join('');
}

function addPlayer() {
  const name = document.getElementById('newPlayerName').value.trim();
  const unit = document.getElementById('newPlayerUnit').value;
  if (!name) return;

  players.push({ id: Date.now(), name, unit,
    td: 0, catch: 0, xp: 0,
    int: 0, flag: 0, sack: 0, defTd: 0
  });

  document.getElementById('newPlayerName').value = '';
  savePlayers();
  renderPlayerList();
  renderAll();
}

function removePlayer(id) {
  if (!confirm('Remove this player?')) return;
  players = players.filter(p => p.id !== id);
  savePlayers();
  renderPlayerList();
  renderAll();
}

// ─── Stats ──────────────────────────────────────────────────────────────────

let currentStat = '';
let currentUnit = '';

const statLabels = { td:'TD', catch:'CATCH', xp:'XP', int:'INT', flag:'FLAG', sack:'SACK', defTd:'TD (DEF)' };

function openStat(stat, unit) {
  currentStat = stat;
  currentUnit = unit;

  document.getElementById('statModalTitle').textContent =
    `${statLabels[stat] || stat} — ${unit.charAt(0).toUpperCase() + unit.slice(1)}`;

  const pool = players.filter(p => p.unit === unit);
  if (!pool.length) {
    document.getElementById('statPlayers').innerHTML =
      '<p style="color:rgba(255,255,255,0.4);">No players in this unit. Add some first.</p>';
  } else {
    document.getElementById('statPlayers').innerHTML = pool.map(p => `
      <div style="display:flex; align-items:center; justify-content:space-between; width:100%; background:rgba(249,115,22,0.08); border-radius:10px; padding:10px 14px; margin-bottom:8px; border:1px solid rgba(249,115,22,0.2);">
        <span style="font-weight:600; font-size:16px; color:var(--orange); flex:1; text-align:left;">${p.name}</span>
        <span id="statVal-${p.id}" style="font-family:'Oswald',sans-serif; font-size:22px; font-weight:700; color:white; min-width:32px; text-align:center;">${p[stat] || 0}</span>
        <div style="display:flex; gap:6px; margin-left:12px;">
          <button onclick="removeStat(${p.id})" style="background:rgba(220,53,69,0.2); color:#f87171; font-size:20px; font-weight:700; padding:6px 14px; border-radius:8px; margin:0; border:1px solid rgba(220,53,69,0.3);">−</button>
          <button onclick="addStat(${p.id})" style="background:var(--orange-dark); color:white; font-size:20px; font-weight:700; padding:6px 14px; border-radius:8px; margin:0;">+</button>
        </div>
      </div>
    `).join('');
  }

  openModal('statModal');
}

function addStat(id) {
  const p = players.find(x => x.id === id);
  if (!p) return;
  p[currentStat] = (p[currentStat] || 0) + 1;
  savePlayers();
  renderAll();
  const el = document.getElementById(`statVal-${id}`);
  if (el) el.textContent = p[currentStat];
}

function removeStat(id) {
  const p = players.find(x => x.id === id);
  if (!p) return;
  p[currentStat] = Math.max(0, (p[currentStat] || 0) - 1);
  savePlayers();
  renderAll();
  const el = document.getElementById(`statVal-${id}`);
  if (el) el.textContent = p[currentStat];
}

function renderAll() {
  let offenseRows = '';
  let defenseRows = '';

  players.forEach(p => {
    if (p.unit === 'offense') {
      offenseRows += `<tr>
        <td>${p.name}</td>
        <td>${p.td}</td>
        <td>${p.catch}</td>
        <td>${p.xp}</td>
      </tr>`;
    }
    if (p.unit === 'defense') {
      defenseRows += `<tr>
        <td>${p.name}</td>
        <td>${p.int}</td>
        <td>${p.flag}</td>
        <td>${p.sack}</td>
        <td>${p.defTd}</td>
      </tr>`;
    }
  });

  document.getElementById('offenseTable').innerHTML =
    `<tr><th>Player</th><th>TD</th><th>CATCH</th><th>XP</th></tr>` + offenseRows;

  document.getElementById('defenseTable').innerHTML =
    `<tr><th>Player</th><th>INT</th><th>FLAG</th><th>SACK</th><th>TD</th></tr>` + defenseRows;
}

// ─── Init ─────────────────────────────────────────────────────────────────────

loadState();

// ─── Modals ─────────────────────────────────────────────────────────────────

function openModal(id)  { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

window.addEventListener('click', e => {
  ['statModal','playerModal','previewModal'].forEach(id => {
    const m = document.getElementById(id);
    if (e.target === m) closeModal(id);
  });
});

// ─── Canvas Export ───────────────────────────────────────────────────────────

const IG_W = 1080;
const FOOTER_H = 180; // footer zone height (bigger than before)

const C = {
  blue:      '#004a87',
  blueDark:  '#002a5c',
  blueMid:   '#005fa3',
  orange:    '#f97316',
  orangeDark:'#c2410c',
  white:     '#ffffff',
  offwhite:  '#f0f0f0',
  black:     '#0a0a0a',
};

const LOGO_URL = 'https://raw.githubusercontent.com/PabloMad77/gators-scoreboard/main/logo.PNG';

function loadLogo() {
  return new Promise((resolve) => {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload  = () => resolve(img);
    img.onerror = () => resolve(null);
    img.src = LOGO_URL;
  });
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function drawLogoWithGlow(ctx, img, x, y, size) {
  if (!img) return;
  ctx.save();
  ctx.shadowColor = C.orange;
  ctx.shadowBlur = 40;
  ctx.drawImage(img, x - size / 2, y - size / 2, size, size);
  ctx.shadowBlur = 80;
  ctx.globalAlpha = 0.4;
  ctx.drawImage(img, x - size / 2, y - size / 2, size, size);
  ctx.restore();
  ctx.drawImage(img, x - size / 2, y - size / 2, size, size);
}

function getMetaInfo() {
  const category   = document.getElementById('categoryName').value.trim();
  const jornadaSel = document.getElementById('jornadaSelect');
  const customJ    = document.getElementById('customJornada').value.trim();
  const jornada    = jornadaSel.value === 'custom' ? customJ : jornadaSel.value || '';
  const now        = new Date();
  const timestamp  = now.toLocaleDateString('es-MX', { weekday:'long', year:'numeric', month:'long', day:'numeric' })
                   + '  •  '
                   + now.toLocaleTimeString('es-MX', { hour:'2-digit', minute:'2-digit' });
  return { category, jornada, timestamp };
}

function drawFooter(ctx, canvasH) {
  const { category, jornada, timestamp } = getMetaInfo();
  const metaLine = [category, jornada].filter(Boolean).join('  ·  ');

  // Dark footer background
  ctx.fillStyle = 'rgba(0,0,0,0.35)';
  ctx.fillRect(0, canvasH - FOOTER_H, IG_W, FOOTER_H);

  // Orange bottom bar
  ctx.fillStyle = C.orange;
  ctx.fillRect(0, canvasH - 22, IG_W, 22);

  // Separator line at top of footer
  ctx.strokeStyle = C.orange;
  ctx.lineWidth = 3;
  ctx.globalAlpha = 0.4;
  ctx.beginPath();
  ctx.moveTo(60, canvasH - FOOTER_H);
  ctx.lineTo(IG_W - 60, canvasH - FOOTER_H);
  ctx.stroke();
  ctx.globalAlpha = 1;

  // "GATORS FLAG FOOTBALL" brand line
  ctx.fillStyle = 'rgba(255,255,255,0.45)';
  ctx.font = '600 38px Oswald, Arial';
  ctx.textAlign = 'center';
  ctx.fillText('GATORS FLAG FOOTBALL', IG_W / 2, canvasH - FOOTER_H + 52);

  // Meta line (category · jornada)
  if (metaLine) {
    ctx.fillStyle = C.orange;
    ctx.font = 'bold 42px Oswald, Arial';
    ctx.fillText(metaLine.toUpperCase(), IG_W / 2, canvasH - FOOTER_H + 104);

    // Timestamp on next line
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.font = '400 30px Oswald, Arial';
    ctx.fillText(timestamp, IG_W / 2, canvasH - FOOTER_H + 148);
  } else {
    // No meta — just timestamp centered
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.font = '400 32px Oswald, Arial';
    ctx.fillText(timestamp, IG_W / 2, canvasH - FOOTER_H + 118);
  }
}

function drawScoreCard(logo) {
  // Fixed content height: top bar + logo area + cards + separator + footer
  const LOGO_AREA  = 380;   // top bar + logo
  const CARD_H     = 420;
  const BELOW_CARD = 80;    // separator + breathing room
  const IG_H = LOGO_AREA + CARD_H + BELOW_CARD + FOOTER_H;

  const canvas = document.createElement('canvas');
  canvas.width  = IG_W;
  canvas.height = IG_H;
  const ctx = canvas.getContext('2d');

  const bg = ctx.createLinearGradient(0, 0, IG_W, IG_H);
  bg.addColorStop(0,   '#001e47');
  bg.addColorStop(0.5, '#003166');
  bg.addColorStop(1,   '#004a87');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, IG_W, IG_H);

  ctx.save();
  ctx.globalAlpha = 0.05;
  ctx.fillStyle = C.orange;
  ctx.beginPath();
  ctx.moveTo(0, IG_H * 0.55);
  ctx.lineTo(IG_W, IG_H * 0.3);
  ctx.lineTo(IG_W, IG_H * 0.6);
  ctx.lineTo(0, IG_H * 0.85);
  ctx.closePath();
  ctx.fill();
  ctx.restore();

  ctx.fillStyle = C.orange;
  ctx.fillRect(0, 0, IG_W, 18);

  if (logo) {
    drawLogoWithGlow(ctx, logo, IG_W / 2, 190, 280);
  } else {
    ctx.fillStyle = C.orange;
    ctx.font = 'bold 110px Oswald, Arial Narrow, Arial';
    ctx.textAlign = 'center';
    ctx.fillText('GATORS', IG_W / 2, 155);
  }

  const cardY = LOGO_AREA - 10;
  const cardPad = 60;
  const halfW  = IG_W / 2 - cardPad;
  const card1X = cardPad;
  const card2X = IG_W / 2 + 20;
  const cardW  = halfW - 20;

  roundRect(ctx, card1X, cardY, cardW, CARD_H, 28);
  ctx.fillStyle = 'rgba(249,115,22,0.1)';
  ctx.fill();
  roundRect(ctx, card1X, cardY, cardW, CARD_H, 28);
  ctx.strokeStyle = C.orange;
  ctx.lineWidth = 4;
  ctx.stroke();

  roundRect(ctx, card2X, cardY, cardW, CARD_H, 28);
  ctx.fillStyle = 'rgba(255,255,255,0.05)';
  ctx.fill();
  roundRect(ctx, card2X, cardY, cardW, CARD_H, 28);
  ctx.strokeStyle = 'rgba(255,255,255,0.2)';
  ctx.lineWidth = 4;
  ctx.stroke();

  ctx.fillStyle = C.orange;
  ctx.font = 'bold 44px Oswald, Arial';
  ctx.textAlign = 'center';
  ctx.fillText('GATORS', card1X + cardW / 2, cardY + 72);

  const opponent = document.getElementById('opponentName').value.trim() || 'RIVAL';
  ctx.fillStyle = C.offwhite;
  ctx.font = 'bold 44px Oswald, Arial';
  ctx.fillText(opponent.toUpperCase(), card2X + cardW / 2, cardY + 72);

  ctx.font = 'bold 220px Oswald, Arial';
  ctx.fillStyle = C.white;
  ctx.fillText(String(gatorsScore), card1X + cardW / 2, cardY + 320);

  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  ctx.fillText(String(opponentScore), card2X + cardW / 2, cardY + 320);

  const vsX = IG_W / 2, vsY = cardY + CARD_H / 2 + 10;
  ctx.fillStyle = C.orange;
  roundRect(ctx, vsX - 42, vsY - 46, 84, 70, 35);
  ctx.fill();
  ctx.fillStyle = C.black;
  ctx.font = 'bold 42px Oswald, Arial';
  ctx.textAlign = 'center';
  ctx.fillText('VS', vsX, vsY + 14);

  drawFooter(ctx, IG_H);
  return canvas;
}

function drawStatsCard(logo) {
  const canvas = document.createElement('canvas');
  canvas.width  = IG_W;
  canvas.height = IG_H;
  const ctx = canvas.getContext('2d');

  const bg = ctx.createLinearGradient(0, 0, IG_W, IG_H);
  bg.addColorStop(0, '#001e47');
  bg.addColorStop(1, '#004a87');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, IG_W, IG_H);

  ctx.fillStyle = C.orange;
  ctx.fillRect(0, 0, IG_W, 18);

  const TITLE_Y = 140;
  if (logo) {
    const logoSize = 90;
    ctx.font = 'bold 90px Oswald, Arial Narrow, Arial';
    const titleW = ctx.measureText('ESTADÍSTICAS').width;
    const groupW = logoSize + 20 + titleW;
    const groupX = (IG_W - groupW) / 2;

    ctx.save();
    ctx.shadowColor = C.orange;
    ctx.shadowBlur = 35;
    ctx.drawImage(logo, groupX, TITLE_Y - logoSize + 10, logoSize, logoSize);
    ctx.shadowBlur = 70;
    ctx.globalAlpha = 0.35;
    ctx.drawImage(logo, groupX, TITLE_Y - logoSize + 10, logoSize, logoSize);
    ctx.restore();
    ctx.drawImage(logo, groupX, TITLE_Y - logoSize + 10, logoSize, logoSize);

    ctx.fillStyle = C.orange;
    ctx.textAlign = 'left';
    ctx.fillText('ESTADÍSTICAS', groupX + logoSize + 20, TITLE_Y);
  } else {
    ctx.fillStyle = C.orange;
    ctx.font = 'bold 90px Oswald, Arial Narrow, Arial';
    ctx.textAlign = 'center';
    ctx.fillText('ESTADÍSTICAS', IG_W / 2, TITLE_Y);
  }

  function drawTable(title, cols, rows, startY) {
    const PAD = 50;
    const tableW = IG_W - PAD * 2;
    const colW = tableW / cols.length;
    const ROW_H = 68;
    const HEAD_H = 58;

    ctx.fillStyle = C.orange;
    ctx.font = 'bold 46px Oswald, Arial';
    ctx.textAlign = 'left';
    ctx.fillText(title, PAD, startY - 10);

    ctx.fillStyle = C.orange;
    ctx.fillRect(PAD, startY, 80, 5);

    const tableY = startY + 20;

    roundRect(ctx, PAD, tableY, tableW, HEAD_H, 14);
    ctx.fillStyle = C.blueDark;
    ctx.fill();

    ctx.fillStyle = C.white;
    ctx.font = 'bold 32px Oswald, Arial';
    ctx.textAlign = 'center';
    cols.forEach((col, i) => {
      ctx.fillText(col.toUpperCase(), PAD + colW * i + colW / 2, tableY + 38);
    });

    rows.forEach((row, ri) => {
      const ry = tableY + HEAD_H + ri * ROW_H;
      roundRect(ctx, PAD, ry, tableW, ROW_H, 0);
      ctx.fillStyle = ri % 2 === 0 ? 'rgba(249,115,22,0.06)' : 'rgba(255,255,255,0.02)';
      ctx.fill();

      ctx.font = '500 30px Oswald, Arial';
      row.forEach((cell, ci) => {
        ctx.fillStyle = ci === 0 ? C.white : 'rgba(255,255,255,0.8)';
        ctx.textAlign = ci === 0 ? 'left' : 'center';
        const cx = ci === 0 ? PAD + 18 : PAD + colW * ci + colW / 2;
        ctx.fillText(String(cell), cx, ry + ROW_H * 0.65);
      });

      ctx.strokeStyle = 'rgba(255,255,255,0.06)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(PAD, ry + ROW_H);
      ctx.lineTo(PAD + tableW, ry + ROW_H);
      ctx.stroke();
    });

    const totalH = HEAD_H + rows.length * ROW_H;
    roundRect(ctx, PAD, tableY, tableW, totalH, 14);
    ctx.strokeStyle = 'rgba(249,115,22,0.25)';
    ctx.lineWidth = 2;
    ctx.stroke();

    return tableY + totalH;
  }

  const offPlayers = players.filter(p => p.unit === 'offense');
  const offWithStats = offPlayers.filter(p => p.td > 0 || p.catch > 0 || p.xp > 0);
  const offRows = offWithStats.length
    ? offWithStats.map(p => [p.name, p.td, p.catch, p.xp])
    : [['—', '—', '—', '—']];

  let nextY = drawTable('OFENSA', ['Jugador','TD','CATCH','XP'], offRows, 215);

  const defPlayers = players.filter(p => p.unit === 'defense');
  const defWithStats = defPlayers.filter(p => p.int > 0 || p.flag > 0 || p.sack > 0 || p.defTd > 0);
  const defRows = defWithStats.length
    ? defWithStats.map(p => [p.name, p.int, p.flag, p.sack, p.defTd])
    : [['—', '—', '—', '—', '—']];

  drawTable('DEFENSA', ['Jugador','INT','FLAG','SACK','TD'], defRows, nextY + 90);

  drawFooter(ctx);
  return canvas;
}

function showPreview(canvas, filename) {
  const dataUrl = canvas.toDataURL('image/png');
  document.getElementById('previewImg').src = dataUrl;

  const btn  = document.getElementById('previewActionBtn');
  const hint = document.getElementById('shareHint');
  hint.style.display = 'none';

  btn.onclick = async () => {
    if (navigator.share && navigator.canShare) {
      try {
        const blob = await (await fetch(dataUrl)).blob();
        const file = new File([blob], filename, { type: 'image/png' });
        if (navigator.canShare({ files: [file] })) {
          await navigator.share({ files: [file], title: 'Gators' });
          return;
        }
      } catch (e) {
        if (e.name === 'AbortError') return;
      }
    }
    const a = document.createElement('a');
    a.download = filename;
    a.href = dataUrl;
    a.click();
  };

  openModal('previewModal');
}

function exportScore() {
  loadLogo().then(logo => {
    showPreview(drawScoreCard(logo), 'gators_score.png');
  });
}

function exportStats() {
  loadLogo().then(logo => {
    showPreview(drawStatsCard(logo), 'gators_stats.png');
  });
}
